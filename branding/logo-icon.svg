<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Green rounded square background -->
  <rect x="5" y="5" width="110" height="110" rx="24" ry="24" fill="#5A9E2F"/>
  <!-- Shadow layer -->
  <rect x="5" y="7" width="110" height="110" rx="24" ry="24" fill="#4A8A24" opacity="0.3"/>
  <rect x="5" y="5" width="110" height="110" rx="24" ry="24" fill="#5A9E2F"/>

  <!-- Moving truck icon -->
  <g transform="translate(16, 26)">
    <!-- Cargo body -->
    <rect x="2" y="8" width="46" height="38" rx="4" ry="4" fill="white"/>
    <!-- Cargo door line -->
    <line x1="25" y1="12" x2="25" y2="42" stroke="#5A9E2F" stroke-width="1.5" opacity="0.2"/>
    <!-- Cargo lines -->
    <line x1="8" y1="18" x2="20" y2="18" stroke="#5A9E2F" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <line x1="8" y1="25" x2="20" y2="25" stroke="#5A9E2F" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
    <line x1="8" y1="32" x2="20" y2="32" stroke="#5A9E2F" stroke-width="2" stroke-linecap="round" opacity="0.15"/>

    <!-- Cab -->
    <path d="M48,20 L48,46 L76,46 L76,32 L66,20 Z" fill="white"/>
    <!-- Cab window -->
    <path d="M52,23 L52,34 L68,34 L62,23 Z" fill="#5A9E2F" opacity="0.2"/>
    <!-- Bumper -->
    <rect x="74" y="36" width="10" height="8" rx="2.5" fill="white" opacity="0.7"/>

    <!-- Undercarriage -->
    <rect x="0" y="46" width="78" height="4" rx="2" fill="white" opacity="0.4"/>

    <!-- Front wheel -->
    <circle cx="62" cy="52" r="10" fill="#3D7A1A" opacity="0.3"/>
    <circle cx="62" cy="52" r="10" stroke="white" stroke-width="5" fill="none"/>
    <circle cx="62" cy="52" r="3.5" fill="white"/>

    <!-- Rear wheel -->
    <circle cx="20" cy="52" r="10" fill="#3D7A1A" opacity="0.3"/>
    <circle cx="20" cy="52" r="10" stroke="white" stroke-width="5" fill="none"/>
    <circle cx="20" cy="52" r="3.5" fill="white"/>

    <!-- Speed lines -->
    <line x1="-4" y1="22" x2="-12" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-4" y1="30" x2="-14" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="-4" y1="38" x2="-10" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>
  </g>
</svg>